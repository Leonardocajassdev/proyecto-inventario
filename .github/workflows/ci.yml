name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────
  # JOB 1: Tests unitarios + integración + PBT
  # ────────────────────────────────────────────────
  backend-tests:
    name: 🧪 Backend — Unit & Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v5

      - name: 🟢 Configurar Node 20
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: 📦 Instalar dependencias backend
        working-directory: backend
        run: npm ci

      - name: ⚙️ Prisma generate
        working-directory: backend
        run: npx prisma generate

      - name: 🧪 Tests unitarios (services)
        working-directory: backend
        run: npm run test:unit -- --forceExit
        env:
          NODE_ENV: test
          DATABASE_URL: "file:./test.db"

      - name: 🔗 Tests de integración (routes)
        working-directory: backend
        run: npm run test:int -- --forceExit
        env:
          NODE_ENV: test
          DATABASE_URL: "file:./test.db"

      - name: 🎲 Property-Based Tests
        working-directory: backend
        run: npm run test:pbt -- --forceExit
        env:
          NODE_ENV: test
          DATABASE_URL: "file:./test.db"

      - name: 📊 Coverage report
        working-directory: backend
        run: npm run test:coverage -- --forceExit
        env:
          NODE_ENV: test
          DATABASE_URL: "file:./test.db"

      - name: 📤 Subir reporte de cobertura
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: coverage-report
          path: backend/coverage/
          retention-days: 7

  # ────────────────────────────────────────────────
  # JOB 2: Mutation Testing con Stryker
  # Solo en push a main (costoso en tiempo)
  # ────────────────────────────────────────────────
  mutation-testing:
    name: 🧬 Mutation Testing (Stryker)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: backend-tests

    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v5

      - name: 🟢 Configurar Node 20
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: 📦 Instalar dependencias backend
        working-directory: backend
        run: npm ci
        env:
          PRISMA_ENGINES_CHECKSUM_IGNORE_MISSING: "1"
        timeout-minutes: 10

      - name: ⚙️ Prisma generate
        working-directory: backend
        run: npx prisma generate

      - name: 🧬 Ejecutar Stryker
        working-directory: backend
        run: npm run mutation
        env:
          NODE_ENV: test
          DATABASE_URL: "file:./test.db"
          NODE_OPTIONS: "--experimental-vm-modules"

      - name: 📤 Subir reporte de mutación
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: mutation-report
          path: backend/reports/mutation/
          retention-days: 14

  # ────────────────────────────────────────────────
  # JOB 3: Build del frontend
  # ────────────────────────────────────────────────
  frontend-build:
    name: 🏗️ Frontend Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v5

      - name: 🟢 Configurar Node 20
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Instalar dependencias frontend
        working-directory: frontend
        run: npm ci

      - name: 🏗️ Build de producción
        working-directory: frontend
        run: npm run build

      - name: 📤 Subir artefacto del build
        uses: actions/upload-artifact@v5
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 3

  # ────────────────────────────────────────────────
  # JOB 4: E2E con Playwright
  # ────────────────────────────────────────────────
  e2e-tests:
    name: 🎭 E2E Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [backend-tests, frontend-build]

    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v5

      - name: 🟢 Configurar Node 20
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: 📦 Instalar backend
        working-directory: backend
        run: npm ci

      - name: ⚙️ Prisma generate + migrate
        working-directory: backend
        run: |
          npx prisma generate
          npx prisma migrate deploy
        env:
          DATABASE_URL: "file:./e2e-test.db"

      - name: 📦 Instalar frontend
        working-directory: frontend
        run: npm ci

      - name: 🎭 Instalar browsers Playwright
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: 🚀 Levantar backend y frontend, esperar que estén listos
        run: |
          # Arrancar backend con logs visibles
          cd backend
          NODE_ENV=e2e PORT=3000 DATABASE_URL="file:./e2e-test.db" npm start > /tmp/backend.log 2>&1 &
          BACKEND_PID=$!
          cd ..

          # Arrancar frontend
          cd frontend
          VITE_API_URL=http://localhost:3000 npm run dev > /tmp/frontend.log 2>&1 &
          cd ..

          # Dar tiempo inicial al backend para arrancar
          sleep 3

          # Esperar ambos (verificar con curl -s sin -f para aceptar cualquier respuesta HTTP)
          for i in $(seq 1 40); do
            BACKEND=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/products 2>/dev/null)
            FRONTEND=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5173 2>/dev/null)
            echo "Intento $i — backend: $BACKEND | frontend: $FRONTEND"
            # Aceptar cualquier código HTTP del backend (200, 500, etc.) — solo que responda
            [[ "$BACKEND" =~ ^[0-9]+$ && "$BACKEND" != "000" ]] && [ "$FRONTEND" = "200" ] && break
            sleep 2
          done

          # Mostrar logs
          echo "=== BACKEND LOG ===" && cat /tmp/backend.log

          # Verificar que el backend responde (cualquier HTTP code)
          CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/products)
          echo "Backend HTTP code: $CODE"
          [[ "$CODE" =~ ^[0-9]+$ && "$CODE" != "000" ]] || (echo "Backend no responde en absoluto" && exit 1)

      - name: 🎭 Ejecutar tests E2E
        working-directory: frontend
        run: npx playwright test --reporter=list
        env:
          BASE_URL: http://localhost:5173

      - name: 📤 Subir reporte Playwright
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7