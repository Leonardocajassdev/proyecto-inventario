name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4

      - name: 🟢 Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 🔵 BACKEND
      - name: 📦 Instalar backend
        run: |
          cd backend
          npm install

      - name: ⚙️ Prisma generate
        run: |
          cd backend
          npx prisma generate

      - name: ✅ Validar backend
        run: |
          cd backend
          node -e "console.log('Backend OK')"

      # 🟣 FRONTEND
      - name: 📦 Instalar frontend
        run: |
          cd frontend
          npm install

      - name: 🏗️ Build frontend
        run: |
          cd frontend
          npm run build